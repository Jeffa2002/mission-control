services:
  panel:
    build: ./panel
    container_name: mission-panel
    restart: unless-stopped
    env_file:
      - ./panel/.env
    environment:
      - PORT=3020
      - HOSTNAME=0.0.0.0
      - IPERF_RESULTS_FILE=/workspace/mission-control/iperf-results.json
      - NETWORK_HISTORY_DB=/workspace/mission-control/network-history.db
      - NETWORK_CACHE_FILE=/tmp/mission-network-cache.json
    ports:
      - "0.0.0.0:3020:3020"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.openclaw/workspace:/workspace
      - /root/.openclaw/agents:/agent-data:ro
      - /root/.openclaw/workspace:/workspace-data:ro
      - /root/.ssh:/root/.ssh:ro
    networks:
      - infra_default

networks:
  infra_default:
    external: true
    name: infra_default
